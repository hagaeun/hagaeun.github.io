<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Class Archive. — Web Design</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,200;0,9..40,300;0,9..40,400;1,9..40,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #ffffff;
      --ink: #111111;
      --ink-mid: #555555;
      --ink-faint: #aaaaaa;
      --line: #e0e0e0;
    }

    html {
      font-size: 16px;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      cursor: none;
      overflow-x: hidden;
    }

    /* ── 커스텀 커서 ── */
    .cursor-dot {
      position: fixed;
      width: 8px;
      height: 8px;
      background: var(--ink);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width 0.25s ease, height 0.25s ease, background 0.25s ease;
    }
    .cursor-dot.expanded {
      width: 36px;
      height: 36px;
      background: transparent;
      border: 1px solid var(--ink);
    }

    /* ══════════════════════════════
       그리드 시스템
       12컬럼 / 좌우 마진 6.25vw / 거터 24px
    ══════════════════════════════ */
    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      column-gap: 24px;
      padding-left: 6.25vw;
      padding-right: 6.25vw;
    }

    /* ── 상단 바 ── */
    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: var(--bg);
      padding-top: 24px;
      padding-bottom: 24px;
    }

    .top-bar .grid {
      align-items: center;
    }

    .top-bar-left {
      grid-column: 1 / 5;
      font-size: 0.72rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      color: var(--ink);
      text-transform: uppercase;
    }

    .top-bar-right {
      grid-column: 9 / 13;
      font-size: 0.72rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      color: var(--ink);
      text-transform: uppercase;
      text-align: right;
    }

    /* ── 히어로 ── */
    .hero {
      padding-top: 160px;
      padding-bottom: 0;
      overflow: hidden;          /* 2026이 이 경계선에서 clip */
      opacity: 0;
      animation: fadeIn 1s ease forwards 0.3s;
    }

    .hero .grid {
      position: relative;
      align-items: start;
      padding-bottom: 80px;
    }

    .hero-title {
      grid-column: 1 / 7;
      grid-row: 1;
      font-size: clamp(5rem, 11vw, 9rem);
      font-weight: 300;
      line-height: 1.0;
      letter-spacing: -0.03em;
      color: var(--ink);
      position: relative;
      z-index: 1;
      align-self: end;
    }

    /* 배경 연도 숫자 — 히어로 하단 경계에서 clip */
    .hero-year {
      grid-column: 5 / 13;
      grid-row: 1 / 3;
      font-size: clamp(18rem, 32vw, 28rem);
      font-weight: 300;
      line-height: 1;
      letter-spacing: -0.04em;
      color: #f2f2f2;
      text-align: right;
      align-self: start;
      margin-top: -0.05em;
      pointer-events: none;
      user-select: none;
      white-space: nowrap;
    }

    .hero-sub {
      grid-column: 1 / 7;
      grid-row: 2;
      margin-top: 16px;
      font-size: 0.9rem;
      font-weight: 300;
      color: var(--ink-faint);
      letter-spacing: 0.01em;
      position: relative;
      z-index: 1;
      padding-bottom: 52px;
      align-self: start;
    }

    /* ── 프로젝트 목록 ── */
    .projects {
      margin-top: 80px;
      opacity: 0;
      animation: fadeIn 1s ease forwards 0.7s;
    }

    /* 그리드 레일 위에 구분선 */
    .projects-inner {
      padding-left: 6.25vw;
      padding-right: 6.25vw;
      border-top: 1px solid var(--line);
    }

    .project-row {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      column-gap: 24px;
      align-items: baseline;
      padding-top: 36px;
      padding-bottom: 36px;
      border-bottom: 1px solid var(--line);
      text-decoration: none;
      color: var(--ink);
      cursor: none;
      position: relative;
      /* 좌우 패딩으로 마진 영역까지 배경 확장, 음수 마진으로 상쇄 */
      margin-left: -6.25vw;
      margin-right: -6.25vw;
      padding-left: 6.25vw;
      padding-right: 6.25vw;
      background-color: transparent;
      transition: background-color 0.25s ease;
    }
    .project-row:hover {
      background-color: #f6f6f6;
    }

    /* 프로젝트명: col 1~8 */
    .proj-name {
      grid-column: 1 / 9;
      font-size: clamp(2rem, 4.5vw, 3.6rem);
      font-weight: 300;
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--ink);
      transition: letter-spacing 0.4s ease;
    }
    .project-row:hover .proj-name {
      letter-spacing: 0.01em;
    }

    /* 카테고리: col 9~11 */
    .proj-category {
      grid-column: 9 / 12;
      font-size: 0.72rem;
      font-weight: 300;
      color: var(--ink-faint);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0;
      transform: translateX(8px);
      transition: opacity 0.35s ease, transform 0.35s ease;
      align-self: center;
    }
    .project-row:hover .proj-category {
      opacity: 1;
      transform: translateX(0);
    }

    /* 번호: col 12 */
    .proj-num {
      grid-column: 12 / 13;
      font-size: 0.72rem;
      font-weight: 300;
      color: var(--ink-faint);
      letter-spacing: 0.1em;
      text-align: right;
      align-self: center;
    }

    /* ── 스크롤 힌트 ── */
    .scroll-hint {
      position: fixed;
      bottom: 28px;
      right: 6.25vw;
      font-size: 0.6rem;
      font-weight: 300;
      color: var(--ink-faint);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      display: flex;
      align-items: center;
      gap: 10px;
      opacity: 0;
      animation: fadeIn 1s ease forwards 1.4s;
    }

    .scroll-hint::before {
      content: '';
      display: block;
      width: 1px;
      height: 32px;
      background: var(--ink-faint);
      animation: scrollLine 2s ease-in-out infinite;
    }

    @keyframes scrollLine {
      0%, 100% { transform: scaleY(1); opacity: 1; }
      50% { transform: scaleY(0.4); opacity: 0.3; }
    }

    /* ── 푸터 ── */
    footer {
      padding-top: 32px;
      padding-bottom: 40px;
      opacity: 0;
      animation: fadeIn 1s ease forwards 1s;
    }

    footer .grid {
      align-items: center;
    }

    .footer-copy {
      grid-column: 1 / 7;
      font-size: 0.65rem;
      font-weight: 300;
      color: var(--ink-faint);
      letter-spacing: 0.08em;
    }

    .footer-note {
      grid-column: 10 / 13;
      font-size: 0.65rem;
      font-weight: 300;
      color: var(--ink-faint);
      letter-spacing: 0.08em;
      text-align: right;
    }

    /* ── 호버 플로트 라벨 ── */
    .float-label {
      position: fixed;
      pointer-events: none;
      z-index: 200;
      font-size: 0.62rem;
      font-weight: 300;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink-mid);
      background: var(--bg);
      border: 1px solid var(--line);
      padding: 6px 12px;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.25s ease, transform 0.25s ease;
      white-space: nowrap;
    }

    .float-label.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── 애니메이션 ── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── 호버 플로트 라벨 ── */
    .float-label {
      position: fixed;
      pointer-events: none;
      z-index: 200;
      font-size: 0.62rem;
      font-weight: 300;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink-mid);
      background: var(--bg);
      border: 1px solid var(--line);
      padding: 6px 12px;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.25s ease, transform 0.25s ease;
      white-space: nowrap;
    }

    .float-label.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── 반응형 ── */
    @media (max-width: 900px) {
      .grid { column-gap: 16px; padding-left: 5vw; padding-right: 5vw; }
      .projects-inner { padding-left: 5vw; padding-right: 5vw; }
      .project-row { margin-left: -5vw; margin-right: -5vw; padding-left: 5vw; padding-right: 5vw; }
      .scroll-hint { right: 5vw; }
    }

    @media (max-width: 680px) {
      .grid { grid-template-columns: repeat(6, 1fr); padding-left: 20px; padding-right: 20px; }
      .projects-inner { padding-left: 20px; padding-right: 20px; }
      .project-row { margin-left: -20px; margin-right: -20px; padding-left: 20px; padding-right: 20px; grid-template-columns: repeat(6, 1fr); }
      .top-bar-left { grid-column: 1 / 4; }
      .top-bar-right { grid-column: 4 / 7; }
      .hero { padding-top: 120px; }
      .hero-title { grid-column: 1 / 7; font-size: 3.4rem; grid-row: 1 / 3; }
      .hero-year { grid-column: 3 / 7; grid-row: 1 / 3; font-size: 14rem; color: #f2f2f2; margin-top: 0; }
      .hero-sub { grid-column: 1 / 7; }
      .proj-name { grid-column: 1 / 6; font-size: 1.75rem; }
      .proj-category { display: none; }
      .proj-num { grid-column: 6 / 7; }
      .footer-copy { grid-column: 1 / 5; }
      .footer-note { grid-column: 5 / 7; }
      .scroll-hint { display: none; }
    }
  </style>
</head>
<body>

  <!-- 커스텀 커서 -->
  <div class="cursor-dot" id="cursorDot"></div>

  <!-- 호버 플로트 라벨 -->
  <div class="float-label" id="floatLabel"></div>

  <!-- 상단 바 -->
  <header class="top-bar">
    <div class="grid">
      <span class="top-bar-left">HAGAEUN</span>
      <span class="top-bar-right">Web Design Class 2026</span>
    </div>
  </header>

  <!-- 히어로 -->
  <section class="hero">
    <div class="grid">
      <h1 class="hero-title">Class<br>Archive.</h1>
      <span class="hero-year" aria-hidden="true">2026</span>
      <p class="hero-sub">A semester of web design work.</p>
    </div>
  </section>

  <!-- 프로젝트 목록 -->
  <main class="projects">
    <div class="projects-inner">

      <a class="project-row" href="class5_book.html" data-label="View Project →">
        <span class="proj-name">Book Introduction</span>
        <span class="proj-category">Editorial UI</span>
        <span class="proj-num">01</span>
      </a>

      <a class="project-row" href="class6_hero/index.html" data-label="View Project →">
        <span class="proj-name">Character Site</span>
        <span class="proj-category">Interactive</span>
        <span class="proj-num">02</span>
      </a>

      <a class="project-row" href="portfolio/index.html" data-label="View Project →">
        <span class="proj-name">Portfolio Website</span>
        <span class="proj-category">Personal</span>
        <span class="proj-num">03</span>
      </a>

      <a class="project-row" href="ui_renewal.pdf" target="_blank" data-label="View PDF →">
        <span class="proj-name">UI Renewal Planning</span>
        <span class="proj-category">UI Planning</span>
        <span class="proj-num">04</span>
      </a>

    </div>
  </main>

  <!-- 푸터 -->
  <footer>
    <div class="grid">
      <span class="footer-copy">Web Design — Semester Final</span>
      <span class="footer-note" id="footerYear"></span>
    </div>
  </footer>

  <script>
    /* ── 커스텀 커서 ── */
    const dot = document.getElementById('cursorDot');
    let mx = -100, my = -100;
    let cx = -100, cy = -100;

    document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

    (function moveCursor() {
      cx += (mx - cx) * 0.15;
      cy += (my - cy) * 0.15;
      dot.style.left = cx + 'px';
      dot.style.top  = cy + 'px';
      requestAnimationFrame(moveCursor);
    })();

    document.querySelectorAll('.project-row').forEach(el => {
      el.addEventListener('mouseenter', () => dot.classList.add('expanded'));
      el.addEventListener('mouseleave', () => dot.classList.remove('expanded'));
    });

    /* ── 플로트 라벨 ── */
    const label = document.getElementById('floatLabel');
    let lx = 0, ly = 0, ltx = 0, lty = 0;

    document.addEventListener('mousemove', e => {
      ltx = e.clientX + 20;
      lty = e.clientY + 16;
    });

    (function moveLabel() {
      lx += (ltx - lx) * 0.1;
      ly += (lty - ly) * 0.1;
      label.style.left = lx + 'px';
      label.style.top  = ly + 'px';
      requestAnimationFrame(moveLabel);
    })();

    document.querySelectorAll('.project-row').forEach(el => {
      el.addEventListener('mouseenter', () => {
        label.textContent = el.dataset.label || '';
        label.classList.add('visible');
      });
      el.addEventListener('mouseleave', () => {
        label.classList.remove('visible');
      });
    });

    /* ── 연도 ── */
    document.getElementById('footerYear').textContent = new Date().getFullYear();

    /* ── 스크롤 시 스크롤 힌트 숨김 ── */
    window.addEventListener('scroll', () => {
      document.querySelector('.scroll-hint').style.opacity = '0';
    }, { once: true });
  </script>
</body>
</html>
